<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>House of Deceit | Countdown Control</title>
  <link rel="icon" type="image/png" href="../assets/logos/eyes-icon.png">
  <style>
    :root{--black:#070609;--panel:#111014;--cream:#f5ead8;--red:#c91f2c;--yellow:#ffe600;--muted:#aaa2ad}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--black);color:var(--cream);font-family:Arial,sans-serif}
    body{padding:28px 18px 60px}
    .wrap{width:min(980px,100%);margin:auto}
    .logo{display:block;width:min(420px,75vw);max-height:125px;object-fit:contain;margin:0 auto 26px}
    .eyebrow{margin:0 0 8px;color:var(--yellow);font-size:.82rem;font-weight:900;letter-spacing:.2em;text-transform:uppercase}
    h1{margin:0 0 28px;font:900 clamp(2.2rem,6vw,4.6rem)/.95 Georgia,serif}
    .panel{background:var(--panel);border:1px solid #38313c;border-left:5px solid var(--yellow);border-radius:12px;padding:clamp(20px,4vw,38px)}
    .field{margin-bottom:24px}
    label{display:block;margin-bottom:9px;font-size:1rem;font-weight:900;color:var(--yellow);letter-spacing:.06em;text-transform:uppercase}
    input,select,button{font:800 1.15rem/1.2 Arial,sans-serif}
    input,select{width:100%;min-height:62px;padding:14px 16px;background:#050505;color:#fff;border:2px solid #4a424d;border-radius:7px}
    input:focus,select:focus{outline:none;border-color:var(--yellow)}
    .inline{display:grid;grid-template-columns:minmax(0,1fr) 180px;gap:12px}
    .duration{display:grid;grid-template-columns:repeat(3,minmax(0,1fr)) 180px;gap:12px}
    .duration label{color:var(--cream);font-size:.8rem}
    button{min-height:62px;padding:13px 20px;border:0;border-radius:7px;background:var(--red);color:#fff;font-weight:900;cursor:pointer}
    button.secondary{background:#29252d;border:2px solid var(--yellow);color:var(--yellow)}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:30px}
    #status{display:block;min-height:28px;margin-top:18px;font-size:1rem;font-weight:800;color:var(--muted)}
    #status.ok{color:#76df9a} #status.bad{color:#ff6570}
    .note{margin:8px 0 0;color:var(--muted)}
    @media(max-width:650px){
      body{padding:20px 12px 40px}
      .inline,.duration,.actions{grid-template-columns:1fr}
      input,select,button{min-height:58px;font-size:1rem}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="../assets/logos/logo.png" alt="House of Deceit">
    <p class="eyebrow">House control</p>
    <h1>Countdown</h1>
    <section class="panel">
      <div class="field">
        <label for="mode">Countdown type</label>
        <select id="mode">
          <option value="target">End at a date &amp; time</option>
          <option value="duration">Start a timed duration now</option>
        </select>
      </div>

      <div id="targetControls" class="field">
        <label for="target">End date &amp; time</label>
        <div class="inline">
          <input id="target" type="datetime-local">
          <button id="twoWeeks" class="secondary" type="button">+ 2 WEEKS</button>
        </div>
      </div>

      <div id="durationControls" class="field" hidden>
        <label>Duration</label>
        <div class="duration">
          <div><label for="hours">Hours</label><input id="hours" type="number" min="0" value="1"></div>
          <div><label for="mins">Minutes</label><input id="mins" type="number" min="0" max="59" value="0"></div>
          <div><label for="secs">Seconds</label><input id="secs" type="number" min="0" max="59" value="0"></div>
          <button id="oneHour" class="secondary" type="button">1 HOUR</button>
        </div>
      </div>

      <div class="field">
        <label for="label">Message above countdown</label>
        <input id="label" type="text" placeholder="For example: The final reveal">
        <p class="note">This appears immediately on the public countdown screen.</p>
      </div>

      <div class="actions">
        <button id="save" type="button">SAVE &amp; UPDATE</button>
        <button id="load" class="secondary" type="button">LOAD CURRENT</button>
      </div>
      <span id="status" aria-live="polite"></span>
    </section>
  </main>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const supabase=createClient(
    "https://hhyfixoxwxmzncosmcqo.supabase.co",
    "sb_publishable_KWvHkZqW2aAipujklitrdg_C7bSBFce"
  );
  const COUNTDOWN_ID="main";
  const $=id=>document.getElementById(id);
  const statusEl=$("status");
  const pad=n=>String(n).padStart(2,"0");

  function showControls(){
    const target=$("mode").value==="target";
    $("targetControls").hidden=!target;
    $("durationControls").hidden=target;
  }

  function setStatus(message,ok=true){
    statusEl.className=ok?"ok":"bad";
    statusEl.textContent=message;
  }

  function setTarget(date){
    $("target").value=`${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
  }

  $("mode").addEventListener("change",showControls);
  $("twoWeeks").addEventListener("click",()=>{setTarget(new Date(Date.now()+14*24*60*60*1000));setStatus("Set to 2 weeks from now.")});
  $("oneHour").addEventListener("click",()=>{$("hours").value=1;$("mins").value=0;$("secs").value=0;setStatus("Set to 1 hour.")});

  async function loadCurrent(){
    setStatus("Loading…");
    const {data,error}=await supabase.from("countdowns").select("id,label,end_time,updated_at").eq("id",COUNTDOWN_ID).maybeSingle();
    if(error){setStatus(error.message,false);return}
    if(!data){setStatus("No countdown has been saved yet.",false);return}
    $("label").value=data.label||"";
    setTarget(new Date(data.end_time));
    $("mode").value="target";
    showControls();
    setStatus("Current countdown loaded.");
  }

  async function save(){
    let endTime;
    if($("mode").value==="target"){
      if(!$("target").value){setStatus("Choose an end date & time.",false);return}
      endTime=new Date($("target").value);
    }else{
      const seconds=(Number($("hours").value||0)*3600)+(Number($("mins").value||0)*60)+Number($("secs").value||0);
      if(seconds<=0){setStatus("Set a duration greater than zero.",false);return}
      endTime=new Date(Date.now()+seconds*1000);
    }

    $("save").disabled=true;
    setStatus("Saving…");
    const {error}=await supabase.from("countdowns").upsert({
      id:COUNTDOWN_ID,
      label:$("label").value.trim(),
      end_time:endTime.toISOString(),
      updated_at:new Date().toISOString()
    },{onConflict:"id"});
    $("save").disabled=false;
    if(error)setStatus(error.message,false);
    else setStatus("Saved. The public countdown is now updated.");
  }

  $("load").addEventListener("click",loadCurrent);
  $("save").addEventListener("click",save);
  showControls();
  loadCurrent();
</script>
</body>
</html>
